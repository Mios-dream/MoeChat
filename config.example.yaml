SV: # verify_speaker 声纹验证配置
  enable: false
  master_audio: test.wav # 包含你声音的wav音频文件，建议3s-5s左右。
  thr: # 阈值，越小越敏感，建议0.5-0.8之间，实测好像不是很有用？
LLM: # 用于其他任务的大模型
  api: https://dashscope.aliyuncs.com/compatible-mode/v1
  key: your-api-key
  model: qwen3.5-plus
  extra_config:
    enable_thinking: false
    # 大模型API额外参数，如：temperature:0.7，温度参数

ChatLLM: # 聊天专用大模型配置
  api: https://dashscope.aliyuncs.com/compatible-mode/v1
  key: your-api-key
  model: qwen-flash-character
  extra_config:
    enable_thinking: false
    # 大模型API额外参数，如：temperature: 0.7，温度参数

SLM: # 用于语音检测，改写，意图判断的小模型
  api: http://localhost:11434/v1/chat/completions
  key:
  model: qwen3:0.6b
  extra_config:
    # 大模型API额外参数，如：temperature: 0.7，温度参数
    temperature: 0.6
    stream: false

TTS:
  mode: local # 可选: api / local
  gptsovits_lite:
    use_bert: true
    use_flash_attn: false
  gptsovits:
    api: http://127.0.0.1:9880/tts

WakeWord:
  enable: false
  provider: cpu # 可选: cpu / cuda
  keywords_score: 1.0
  keywords_threshold: 0.25

KnowledgeBase:
  base_dir: database
  # 是否启用大模型抽取知识库功能，启用后会定时检查知识库文件是否有更新，有更新则调用大模型接口抽取知识库
  enable_llm_extract: true
  health_check_interval_sec: 3600

Tools:
  # 是否启用工具/技能系统
  enabled: true
  # 是否自动扫描 plugins/ 目录加载技能
  auto_discover: true
  # 工具执行超时时间（秒）
  timeout: 30
  # 工具调用最大轮次（防止无限循环）
  max_rounds: 5

MotionGenerator:
  # 动作生成器版本: v2 | v3
  # v2: 单次请求生成完整动作序列（默认）
  # v3: 信息调度中心（推荐，可扩展）
  version: v3
