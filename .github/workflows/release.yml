name: Build and Release

on:
  push:
    tags:
      - "v*" # 推送 v1.0.0, v1.1.0 等标签时触发

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Extract version from tag
        id: get_version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create source archive
        run: |
          # 打包源码，排除不需要的文件
          git archive --format=zip --prefix=MoeChat/ \
            -o MoeChat-${{ steps.get_version.outputs.VERSION }}.zip \
            HEAD

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "MoeChat v${{ steps.get_version.outputs.VERSION }}"
          body_path: .github/release_template.md
          fail_on_unmatched: true
          files: |
            MoeChat-${{ steps.get_version.outputs.VERSION }}.zip
          generate_release_notes: true
