[project]
name = "moechat"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "audiolab>=0.5.1",
    "colorlog>=6.10.1",
    "faiss-cpu>=1.13.2",
    "fastapi>=0.135.2",
    "funasr>=1.3.1",
    "httpx>=0.28.1",
    "jionlp>=1.5.27",
    "modelscope>=1.35.3",
    "numpy>=2.4.3",
    "onnxruntime>=1.24.4",
    "openai>=2.30.0",
    "praat-parselmouth>=0.4.7",
    "pyrnnoise>=0.4.3",
    "python-multipart>=0.0.22",
    "rich>=14.3.3",
    "ruamel-yaml>=0.19.1",
    "shortuuid>=1.0.13",
    "soundfile>=0.13.1",
    "torch>=2.11.0",
    "torchaudio>=2.11.0",
    "transformers>=5.4.0",
    "uvicorn>=0.42.0",
]

[project.optional-dependencies]
test = [
    "ipykernel>=6.30.1",
    "ipython>=8.37.0",
    "accelerate"
]


[[tool.uv.index]]
url = "https://mirrors.ustc.edu.cn/pypi/simple"
default = true

[tool.uv.sources]
torch = [
  { index = "pytorch-windows", marker = "sys_platform != 'linux'" },
  { index = "pytorch-linux", marker = "sys_platform == 'linux'" },
]
torchaudio = [
  { index = "pytorch-windows", marker = "sys_platform != 'linux'" },
  { index = "pytorch-linux", marker = "sys_platform == 'linux'" },
]

[[tool.uv.index]]
name = "pytorch-windows"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[[tool.uv.index]]
name = "pytorch-linux"
url = "https://mirrors.ustc.edu.cn/pypi/simple"
explicit = true
